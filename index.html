<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cosmic Chaos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:'Exo 2',sans-serif;}
#wrap{position:relative;}
canvas{display:block;cursor:none;}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none;}
#hud{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 18px;pointer-events:none;}
.hud-block{display:flex;flex-direction:column;gap:2px;}
.hud-label{font-size:10px;letter-spacing:3px;color:#4af;opacity:0.7;font-family:'Orbitron',monospace;}
.hud-val{font-size:22px;font-weight:700;color:#fff;font-family:'Orbitron',monospace;text-shadow:0 0 12px #4af;}
#combo-display{position:absolute;top:60px;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:#ff6a00;text-shadow:0 0 20px #ff6a00;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
#boss-bar{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);width:340px;opacity:0;transition:opacity 0.5s;pointer-events:none;}
#boss-label{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;color:#f44;text-align:center;margin-bottom:4px;}
#boss-track{height:8px;background:rgba(255,0,0,0.15);border:1px solid #f443;border-radius:4px;overflow:hidden;}
#boss-fill{height:100%;background:linear-gradient(90deg,#f00,#f80);width:100%;border-radius:4px;transition:width 0.1s;}
#powerup-icons{position:absolute;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;pointer-events:none;}
.pu-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;opacity:0.9;border:1px solid rgba(255,255,255,0.3);}
#lives-display{display:flex;gap:4px;margin-top:4px;}
.life-pip{width:10px;height:10px;background:#4af;border-radius:50%;box-shadow:0 0 6px #4af;}
.life-pip.dead{background:#333;box-shadow:none;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="hud">
      <div class="hud-block">
        <span class="hud-label">SCORE</span>
        <span class="hud-val" id="scoreVal">0</span>
      </div>
      <div class="hud-block" style="align-items:center;">
        <span class="hud-label">LIVES</span>
        <div id="lives-display"></div>
      </div>
      <div class="hud-block" style="align-items:flex-end;">
        <span class="hud-label">BEST</span>
        <span class="hud-val" id="bestVal">0</span>
      </div>
    </div>
    <div id="powerup-icons"></div>
    <div id="combo-display"></div>
    <div id="boss-bar">
      <div id="boss-label">⚠ BOSS INCOMING ⚠</div>
      <div id="boss-track"><div id="boss-fill"></div></div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  const maxW = Math.min(window.innerWidth, 520);
  const maxH = Math.min(window.innerHeight, 760);
  W = canvas.width = maxW;
  H = canvas.height = maxH;
}
resize();
window.addEventListener('resize', () => { resize(); if(game) game.handleResize(); });

// ── Utility ─────────────────────────────────────────────
const rand = (a,b) => a + Math.random()*(b-a);
const randInt = (a,b) => Math.floor(rand(a,b+1));
const lerp = (a,b,t) => a+(b-a)*t;
const dist = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));

// ── Stars ────────────────────────────────────────────────
class StarField {
  constructor() {
    this.layers = [
      Array.from({length:80}, () => this.mk(0.3,1.2)),
      Array.from({length:50}, () => this.mk(0.6,1.8)),
      Array.from({length:25}, () => this.mk(1.2,2.5)),
    ];
    this.nebulas = Array.from({length:6}, () => ({
      x: rand(0,1), y: rand(0,1),
      r: rand(80,160),
      hue: randInt(180,280),
      a: rand(0.04,0.09)
    }));
  }
  mk(minS, maxS) {
    return { x:rand(0,W), y:rand(0,H), s:rand(minS,maxS), a:rand(0.4,1), twinkle:rand(0,Math.PI*2) };
  }
  draw(speed) {
    // Nebulas
    this.nebulas.forEach(n => {
      const grd = ctx.createRadialGradient(n.x*W, n.y*H, 0, n.x*W, n.y*H, n.r);
      grd.addColorStop(0, `hsla(${n.hue},80%,60%,${n.a})`);
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(n.x*W, n.y*H, n.r, 0, Math.PI*2);
      ctx.fill();
    });
    // Stars by parallax layer
    [0.1,0.3,0.7].forEach((spd,i) => {
      this.layers[i].forEach(s => {
        s.y += spd * speed;
        s.twinkle += 0.05;
        if (s.y > H+4) { s.y = -4; s.x = rand(0,W); }
        const alpha = s.a * (0.7 + 0.3*Math.sin(s.twinkle));
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.s, 0, Math.PI*2);
        ctx.fill();
      });
    });
  }
}

// ── Particle ─────────────────────────────────────────────
class Particle {
  constructor(x,y,opts={}) {
    this.x=x; this.y=y;
    this.vx = opts.vx ?? rand(-3,3);
    this.vy = opts.vy ?? rand(-3,3);
    this.life = 1;
    this.decay = opts.decay ?? rand(0.02,0.04);
    this.size = opts.size ?? rand(2,5);
    this.color = opts.color ?? `hsl(${rand(20,60)},100%,70%)`;
    this.gravity = opts.gravity ?? 0;
    this.shrink = opts.shrink ?? 0.97;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += this.gravity;
    this.vx *= 0.98; this.vy *= 0.98;
    this.life -= this.decay;
    this.size *= this.shrink;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ── Bullet ───────────────────────────────────────────────
class Bullet {
  constructor(x,y,angle,speed,opts={}) {
    this.x=x; this.y=y;
    this.vx=Math.cos(angle)*speed;
    this.vy=Math.sin(angle)*speed;
    this.r = opts.r ?? 4;
    this.color = opts.color ?? '#4ff';
    this.damage = opts.damage ?? 1;
    this.isEnemy = opts.isEnemy ?? false;
    this.trail = [];
    this.alive = true;
  }
  update() {
    this.trail.push({x:this.x, y:this.y});
    if(this.trail.length > 6) this.trail.shift();
    this.x += this.vx; this.y += this.vy;
    if(this.x<-20||this.x>W+20||this.y<-20||this.y>H+20) this.alive=false;
  }
  draw() {
    ctx.save();
    // Trail
    this.trail.forEach((t,i) => {
      ctx.globalAlpha = (i/this.trail.length)*0.4;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.r*(i/this.trail.length), 0, Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

// ── Ship ─────────────────────────────────────────────────
class Ship {
  constructor() {
    this.x = W/2; this.y = H*0.75;
    this.vx=0; this.vy=0;
    this.r = 18;
    this.angle = -Math.PI/2;
    this.thrustAngle = 0;
    this.engineFlare = 0;
    this.invincible = 0;
    this.shield = false;
    this.shieldTime = 0;
    this.rapidFire = false;
    this.rapidTime = 0;
    this.speed = false;
    this.speedTime = 0;
    this.fireRate = 0;
    this.fireDelay = 0;
    this.shootCooldown = 0;
    this.trail = [];
  }
  update(keys, touchDir) {
    let ax=0, ay=0;
    const spd = this.speed ? 5.5 : 3.8;
    if(keys['ArrowLeft']||keys['a']||keys['A']) ax=-spd;
    if(keys['ArrowRight']||keys['d']||keys['D']) ax=spd;
    if(keys['ArrowUp']||keys['w']||keys['W']) ay=-spd;
    if(keys['ArrowDown']||keys['s']||keys['S']) ay=spd;
    if(touchDir) { ax+=touchDir.x*spd; ay+=touchDir.y*spd; }
    this.vx = lerp(this.vx, ax, 0.18);
    this.vy = lerp(this.vy, ay, 0.18);
    this.x = clamp(this.x+this.vx, this.r, W-this.r);
    this.y = clamp(this.y+this.vy, this.r, H-this.r);
    this.engineFlare = Math.abs(ax)+Math.abs(ay) > 0.5 ? Math.min(1, this.engineFlare+0.1) : Math.max(0, this.engineFlare-0.05);
    this.angle = lerp(this.angle, -Math.PI/2 + (this.vx/spd)*0.4, 0.1);
    this.trail.push({x:this.x, y:this.y+10});
    if(this.trail.length>18) this.trail.shift();
    if(this.invincible>0) this.invincible--;
    if(this.shieldTime>0) { this.shieldTime--; this.shield=true; } else this.shield=false;
    if(this.rapidTime>0) { this.rapidTime--; this.rapidFire=true; } else this.rapidFire=false;
    if(this.speedTime>0) { this.speedTime--; this.speed=true; } else this.speed=false;
    if(this.shootCooldown>0) this.shootCooldown--;
  }
  canShoot() { return this.shootCooldown<=0; }
  shoot() {
    const delay = this.rapidFire ? 4 : 12;
    this.shootCooldown = delay;
    const bullets = [];
    const bx = this.x + Math.cos(this.angle)*this.r;
    const by = this.y + Math.sin(this.angle)*this.r;
    bullets.push(new Bullet(bx, by, this.angle, 14, {color:'#4ff',r:4,damage:1}));
    if(this.rapidFire) {
      bullets.push(new Bullet(bx-8, by, this.angle, 14, {color:'#0ff',r:3,damage:1}));
      bullets.push(new Bullet(bx+8, by, this.angle, 14, {color:'#0ff',r:3,damage:1}));
    }
    return bullets;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    // Invincibility flicker
    if(this.invincible>0 && Math.floor(this.invincible/4)%2===0) { ctx.restore(); return; }

    // Engine trail
    this.trail.forEach((t,i) => {
      const a = (i/this.trail.length)*0.35*this.engineFlare;
      ctx.save();
      ctx.globalAlpha = a;
      const grd = ctx.createRadialGradient(t.x-this.x, t.y-this.y, 0, t.x-this.x, t.y-this.y, 6);
      grd.addColorStop(0, '#4af');
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(t.x-this.x, t.y-this.y, 6*(i/this.trail.length), 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });

    ctx.rotate(this.angle + Math.PI/2);

    // Engine glow
    if(this.engineFlare>0.1) {
      const eg = ctx.createRadialGradient(0,14,0,0,14,22);
      eg.addColorStop(0,`rgba(80,160,255,${0.8*this.engineFlare})`);
      eg.addColorStop(1,'transparent');
      ctx.fillStyle=eg;
      ctx.beginPath();ctx.arc(0,14,22,0,Math.PI*2);ctx.fill();
    }

    // Shield bubble
    if(this.shield) {
      ctx.save();
      ctx.globalAlpha=0.3+0.1*Math.sin(Date.now()*0.01);
      const sg=ctx.createRadialGradient(0,0,this.r*0.5,0,0,this.r*1.6);
      sg.addColorStop(0,'rgba(0,200,255,0.1)');
      sg.addColorStop(0.8,'rgba(0,200,255,0.4)');
      sg.addColorStop(1,'transparent');
      ctx.fillStyle=sg;
      ctx.beginPath();ctx.arc(0,0,this.r*1.7,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(0,220,255,0.8)';
      ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,0,this.r*1.6,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }

    // Ship body
    ctx.shadowColor='#4af';
    ctx.shadowBlur=18;

    // Main hull
    ctx.fillStyle='#1a2a4a';
    ctx.beginPath();
    ctx.moveTo(0,-22);
    ctx.lineTo(-14,12);
    ctx.lineTo(-6,8);
    ctx.lineTo(0,16);
    ctx.lineTo(6,8);
    ctx.lineTo(14,12);
    ctx.closePath();
    ctx.fill();

    // Hull highlight
    ctx.fillStyle='#2a4a7a';
    ctx.beginPath();
    ctx.moveTo(0,-18);
    ctx.lineTo(-7,6);
    ctx.lineTo(0,10);
    ctx.lineTo(7,6);
    ctx.closePath();
    ctx.fill();

    // Cockpit
    const cg=ctx.createRadialGradient(0,-10,0,0,-10,7);
    cg.addColorStop(0,'rgba(100,220,255,0.9)');
    cg.addColorStop(1,'rgba(0,100,200,0.4)');
    ctx.fillStyle=cg;
    ctx.beginPath();ctx.ellipse(0,-10,5,7,0,0,Math.PI*2);ctx.fill();

    // Wings accent
    ctx.strokeStyle='#4af';
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-14,12);ctx.lineTo(-18,18);ctx.lineTo(-8,14);ctx.stroke();
    ctx.beginPath();ctx.moveTo(14,12);ctx.lineTo(18,18);ctx.lineTo(8,14);ctx.stroke();

    // Engine glow nozzles
    ctx.fillStyle=`rgba(80,160,255,${0.5+0.5*this.engineFlare})`;
    ctx.beginPath();ctx.ellipse(-6,16,3,5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(6,16,3,5,0,0,Math.PI*2);ctx.fill();

    ctx.restore();
  }
}

// ── Asteroid ──────────────────────────────────────────────
class Asteroid {
  constructor(opts={}) {
    this.r = opts.r ?? rand(18,40);
    this.x = opts.x ?? (Math.random()<0.5 ? -this.r : W+this.r);
    this.y = opts.y ?? rand(-this.r, H*0.6);
    const angle = opts.angle ?? rand(0.3, Math.PI-0.3);
    const spd = opts.spd ?? rand(0.8,2.2);
    this.vx = Math.cos(angle)*spd*(this.x<0?1:-1);
    this.vy = Math.sin(angle)*spd + rand(0.2,0.8);
    this.rot = 0;
    this.rotSpd = rand(-0.02,0.02);
    this.hp = opts.hp ?? Math.ceil(this.r/10);
    this.maxHp = this.hp;
    this.alive = true;
    this.hue = randInt(20,50);
    this.points = this.genPoints();
  }
  genPoints() {
    const n = randInt(7,11);
    return Array.from({length:n},(_, i)=>{
      const a = (i/n)*Math.PI*2;
      const r = this.r*(0.7+Math.random()*0.3);
      return {x:Math.cos(a)*r, y:Math.sin(a)*r};
    });
  }
  update() {
    this.x+=this.vx; this.y+=this.vy;
    this.rot+=this.rotSpd;
    if(this.x<-120||this.x>W+120||this.y>H+120) this.alive=false;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.rot);
    const dmgRatio = 1 - this.hp/this.maxHp;
    ctx.shadowColor=`hsl(${this.hue},60%,50%)`;
    ctx.shadowBlur=8;
    ctx.fillStyle=`hsl(${this.hue},30%,${25+dmgRatio*20}%)`;
    ctx.strokeStyle=`hsl(${this.hue},50%,${45+dmgRatio*20}%)`;
    ctx.lineWidth=2;
    ctx.beginPath();
    this.points.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    // crack lines if damaged
    if(dmgRatio>0.5) {
      ctx.strokeStyle=`rgba(255,180,80,${dmgRatio-0.4})`;
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(-this.r*0.3,0);ctx.lineTo(this.r*0.4,this.r*0.2);
      ctx.moveTo(0,-this.r*0.3);ctx.lineTo(-this.r*0.2,this.r*0.3);
      ctx.stroke();
    }
    ctx.restore();
  }
}

// ── Enemy types ───────────────────────────────────────────
class Enemy {
  constructor(type, wave) {
    this.type = type;
    this.wave = wave;
    this.alive = true;
    this.x = rand(40, W-40);
    this.y = -40;
    this.angle = 0;
    this.timer = 0;
    this.shootTimer = 0;
    if(type==='scout') {
      this.r=14; this.hp=2; this.spd=2.2+wave*0.1;
      this.color='#f84'; this.score=50;
      this.pattern='zigzag';
    } else if(type==='cruiser') {
      this.r=22; this.hp=5+wave; this.spd=1.2+wave*0.05;
      this.color='#f48'; this.score=120;
      this.pattern='strafe';
    } else if(type==='bomber') {
      this.r=18; this.hp=3+wave; this.spd=1.0;
      this.color='#8f4'; this.score=80;
      this.pattern='dive';
    }
    this.maxHp = this.hp;
  }
  update(ship) {
    this.timer++;
    this.shootTimer++;
    if(this.pattern==='zigzag') {
      this.x += Math.sin(this.timer*0.06)*3.5;
      this.y += this.spd;
    } else if(this.pattern==='strafe') {
      this.y += this.spd * (this.y < H*0.25 ? 1 : 0.1);
      this.x += Math.sin(this.timer*0.03)*2;
    } else if(this.pattern==='dive') {
      const dx=ship.x-this.x, dy=ship.y-this.y;
      const d=Math.hypot(dx,dy);
      this.x += (dx/d)*this.spd;
      this.y += (dy/d)*this.spd;
    }
    if(this.y>H+60||this.x<-60||this.x>W+60) this.alive=false;
  }
  canShoot() {
    const rate = this.type==='cruiser'?60:this.type==='bomber'?90:120;
    return this.shootTimer>rate && this.y>0;
  }
  shoot(ship) {
    this.shootTimer=0;
    const dx=ship.x-this.x, dy=ship.y-this.y;
    const a=Math.atan2(dy,dx);
    const bullets=[];
    if(this.type==='cruiser') {
      for(let i=-1;i<=1;i++) bullets.push(new Bullet(this.x,this.y,a+i*0.2,4,{color:'#f48',r:5,isEnemy:true}));
    } else {
      bullets.push(new Bullet(this.x,this.y,a,3.5+(this.wave*0.05),{color:this.color,r:4,isEnemy:true}));
    }
    return bullets;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x,this.y);
    const dmg = 1-this.hp/this.maxHp;
    ctx.shadowColor=this.color;
    ctx.shadowBlur=15;
    if(this.type==='scout') {
      ctx.fillStyle='#2a1a0a';
      ctx.strokeStyle=this.color;
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(0,14);ctx.lineTo(-14,-10);ctx.lineTo(0,-6);ctx.lineTo(14,-10);ctx.closePath();
      ctx.fill();ctx.stroke();
      ctx.fillStyle=this.color;
      ctx.beginPath();ctx.ellipse(0,0,5,5,0,0,Math.PI*2);ctx.fill();
    } else if(this.type==='cruiser') {
      ctx.fillStyle='#200a18';
      ctx.strokeStyle=this.color;
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(0,20);ctx.lineTo(-20,-8);ctx.lineTo(-10,-18);ctx.lineTo(0,-12);
      ctx.lineTo(10,-18);ctx.lineTo(20,-8);ctx.closePath();
      ctx.fill();ctx.stroke();
      ctx.fillStyle=this.color;
      for(let i=-1;i<=1;i+=2){
        ctx.beginPath();ctx.ellipse(i*8,-4,4,4,0,0,Math.PI*2);ctx.fill();
      }
    } else if(this.type==='bomber') {
      ctx.fillStyle='#0a200a';
      ctx.strokeStyle=this.color;
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.arc(0,0,this.r,0,Math.PI*2);
      ctx.fill();ctx.stroke();
      ctx.strokeStyle=`rgba(140,255,80,0.4)`;
      ctx.beginPath();ctx.arc(0,0,this.r+4+dmg*8,0,Math.PI*2);ctx.stroke();
    }
    // HP bar
    if(this.hp<this.maxHp) {
      const bw=this.r*2.5;
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.fillRect(-bw/2,-this.r-10,bw,4);
      ctx.fillStyle=this.color;
      ctx.fillRect(-bw/2,-this.r-10,bw*(this.hp/this.maxHp),4);
    }
    ctx.restore();
  }
}

// ── Boss ──────────────────────────────────────────────────
class Boss {
  constructor(wave) {
    this.wave = wave;
    this.x = W/2; this.y = -80;
    this.r = 55;
    this.hp = 80 + wave*25;
    this.maxHp = this.hp;
    this.alive = true;
    this.phase = 0;
    this.timer = 0;
    this.shootTimer = 0;
    this.angle = 0;
    this.targetX = W/2;
    this.vx = 0;
    this.entered = false;
    this.score = 1000 + wave*200;
    this.color = `hsl(${wave*40},100%,60%)`;
    this.spinAngle = 0;
  }
  update(ship) {
    this.timer++;
    this.spinAngle += 0.02;
    if(!this.entered) {
      this.y = Math.min(H*0.22, this.y+2);
      if(this.y>=H*0.22) this.entered=true;
      return null;
    }
    // Movement phases
    const p = Math.floor(this.timer/180)%3;
    if(p===0) { this.targetX = W*0.25; }
    else if(p===1) { this.targetX = W*0.75; }
    else { this.targetX = W/2; }
    this.vx = lerp(this.vx, (this.targetX-this.x)*0.02, 0.1);
    this.x += this.vx;

    this.shootTimer++;
    const bullets = [];
    if(this.shootTimer%20===0) {
      // Spiral pattern
      for(let i=0;i<6;i++) {
        const a = this.spinAngle + (i/6)*Math.PI*2;
        bullets.push(new Bullet(this.x,this.y,a,3.5,{color:this.color,r:5,isEnemy:true}));
      }
    }
    if(this.shootTimer%60===0) {
      // Aimed shot
      const a=Math.atan2(ship.y-this.y,ship.x-this.x);
      bullets.push(new Bullet(this.x,this.y,a,5,{color:'#fff',r:7,isEnemy:true,damage:2}));
    }
    return bullets.length ? bullets : null;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x,this.y);
    const dmg=1-this.hp/this.maxHp;
    ctx.shadowColor=this.color;
    ctx.shadowBlur=30+dmg*20;

    // Outer ring
    ctx.strokeStyle=this.color;
    ctx.lineWidth=3;
    ctx.globalAlpha=0.5+0.3*Math.sin(this.timer*0.1);
    ctx.beginPath();ctx.arc(0,0,this.r*1.5,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;

    // Spinning turrets
    for(let i=0;i<4;i++) {
      const a=this.spinAngle+(i/4)*Math.PI*2;
      const tx=Math.cos(a)*this.r*0.8;
      const ty=Math.sin(a)*this.r*0.8;
      ctx.fillStyle=this.color;
      ctx.beginPath();ctx.arc(tx,ty,8,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#fff';
      ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(tx,ty,8,0,Math.PI*2);ctx.stroke();
    }

    // Main body
    ctx.fillStyle='#111';
    ctx.strokeStyle=this.color;
    ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(0,0,this.r,0,Math.PI*2);ctx.fill();ctx.stroke();

    // Inner detail
    ctx.strokeStyle=`rgba(255,255,255,0.2)`;
    ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(0,0,this.r*0.6,0,Math.PI*2);ctx.stroke();

    // Core
    const cg=ctx.createRadialGradient(0,0,0,0,0,this.r*0.4);
    cg.addColorStop(0,this.color);
    cg.addColorStop(1,'transparent');
    ctx.fillStyle=cg;
    ctx.beginPath();ctx.arc(0,0,this.r*0.4,0,Math.PI*2);ctx.fill();

    // Damage cracks
    if(dmg>0.3) {
      ctx.strokeStyle=`rgba(255,100,0,${dmg})`;
      ctx.lineWidth=2;
      for(let i=0;i<4;i++) {
        const a=i*1.5+dmg;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*10,Math.sin(a)*10);
        ctx.lineTo(Math.cos(a+0.3)*this.r*0.8,Math.sin(a+0.3)*this.r*0.8);
        ctx.stroke();
      }
    }

    ctx.restore();

    // HP bar
    const bw=200;
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillRect(W/2-bw/2, H-50, bw, 12);
    ctx.fillStyle=`hsl(${this.hp/this.maxHp*120},100%,50%)`;
    ctx.fillRect(W/2-bw/2, H-50, bw*(this.hp/this.maxHp), 12);
    ctx.strokeStyle='rgba(255,255,255,0.3)';
    ctx.lineWidth=1;
    ctx.strokeRect(W/2-bw/2, H-50, bw, 12);
  }
}

// ── PowerUp ───────────────────────────────────────────────
class PowerUp {
  constructor(x,y) {
    this.x=x; this.y=y;
    this.r=14;
    const types=['shield','rapid','speed','life'];
    this.type=types[randInt(0,types.length-1)];
    this.vy=1.2;
    this.alive=true;
    this.angle=0;
    this.colors={shield:'#0cf',rapid:'#f80',speed:'#0f8',life:'#f06'};
    this.icons={shield:'🛡',rapid:'⚡',speed:'💨',life:'❤'};
    this.color=this.colors[this.type];
  }
  update(){this.y+=this.vy;this.angle+=0.03;if(this.y>H+20)this.alive=false;}
  draw(){
    ctx.save();
    ctx.translate(this.x,this.y);
    ctx.rotate(this.angle);
    ctx.shadowColor=this.color;
    ctx.shadowBlur=20;
    ctx.fillStyle=this.color+'33';
    ctx.strokeStyle=this.color;
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,this.r,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.restore();
    ctx.save();
    ctx.font='14px sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(this.icons[this.type],this.x,this.y);
    ctx.restore();
  }
}

// ── Explosion ─────────────────────────────────────────────
function explode(x,y,size=1,color='#f80') {
  const n = Math.floor(12*size);
  for(let i=0;i<n;i++) {
    const spd=rand(1,5)*size;
    const a=rand(0,Math.PI*2);
    particles.push(new Particle(x,y,{
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      color:`hsl(${rand(10,50)},100%,${rand(60,90)}%)`,
      size:rand(2,6)*size, decay:rand(0.015,0.04),
      shrink:0.95
    }));
  }
  // Ring
  for(let i=0;i<8;i++) {
    const a=(i/8)*Math.PI*2;
    particles.push(new Particle(x,y,{
      vx:Math.cos(a)*3*size, vy:Math.sin(a)*3*size,
      color:'rgba(255,255,200,0.8)',
      size:3*size, decay:0.06, shrink:0.92
    }));
  }
}

// ── Screen shake ──────────────────────────────────────────
let shakeAmt=0, shakeX=0, shakeY=0;
function shake(amt) { shakeAmt=Math.max(shakeAmt,amt); }

// ── Game ──────────────────────────────────────────────────
let particles=[];
let game;

class Game {
  constructor() {
    this.state='menu'; // menu|playing|dead
    this.stars=new StarField();
    this.ship=new Ship();
    this.asteroids=[];
    this.enemies=[];
    this.bullets=[];
    this.powerups=[];
    this.boss=null;
    this.score=0;
    this.best=parseInt(localStorage.getItem('cc_best')||'0');
    this.lives=3;
    this.wave=1;
    this.combo=0;
    this.comboTimer=0;
    this.multiplier=1;
    this.frame=0;
    this.waveTimer=0;
    this.bossTimer=0;
    this.bossWarning=0;
    this.speed=1;
    this.keys={};
    this.touchDir=null;
    this.activePowerups=[];
    this.menuBlink=0;
    this.deathTimer=0;
    document.getElementById('bestVal').textContent=this.best;
    this.setupInput();
    this.setupTouch();
    this.updateLivesUI();
  }
  handleResize() { this.stars=new StarField(); }

  setupInput() {
    window.addEventListener('keydown',e=>{
      this.keys[e.code]=true; this.keys[e.key]=true;
      if(e.code==='Space'){
        e.preventDefault();
        if(this.state==='menu')this.start();
        else if(this.state==='dead'&&this.deathTimer>60)this.restart();
      }
    });
    window.addEventListener('keyup',e=>{this.keys[e.code]=false;this.keys[e.key]=false;});
  }

  setupTouch() {
    let touchStart=null;
    const handleTap=()=>{
      if(this.state==='menu')this.start();
      else if(this.state==='dead'&&this.deathTimer>60)this.restart();
    };
    canvas.addEventListener('touchstart',e=>{
      e.preventDefault();
      const t=e.touches[0];
      touchStart={x:t.clientX,y:t.clientY};
      if(this.state!=='playing')handleTap();
    },{passive:false});
    canvas.addEventListener('touchmove',e=>{
      e.preventDefault();
      if(!touchStart||this.state!=='playing')return;
      const t=e.touches[0];
      const dx=t.clientX-touchStart.x;
      const dy=t.clientY-touchStart.y;
      const len=Math.hypot(dx,dy);
      this.touchDir=len>5?{x:clamp(dx/50,-1,1),y:clamp(dy/50,-1,1)}:{x:0,y:0};
    },{passive:false});
    canvas.addEventListener('touchend',e=>{e.preventDefault();this.touchDir=null;touchStart=null;},{passive:false});
    canvas.addEventListener('click',()=>{
      if(this.state!=='playing')handleTap();
    });
  }

  start() {
    this.state='playing';
    this.score=0;
    this.lives=3;
    this.wave=1;
    this.combo=0;
    this.multiplier=1;
    this.frame=0;
    this.waveTimer=0;
    this.bossTimer=0;
    this.bossWarning=0;
    this.speed=1;
    this.ship=new Ship();
    this.asteroids=[];
    this.enemies=[];
    this.bullets=[];
    this.powerups=[];
    this.boss=null;
    particles=[];
    this.activePowerups=[];
    this.updateLivesUI();
    this.updatePowerupUI();
    document.getElementById('boss-bar').style.opacity='0';
  }

  restart() { this.start(); }

  addScore(v) {
    const pts = Math.floor(v * this.multiplier);
    this.score += pts;
    document.getElementById('scoreVal').textContent = this.score;
    if(this.score>this.best) {
      this.best=this.score;
      localStorage.setItem('cc_best',this.best);
      document.getElementById('bestVal').textContent=this.best;
    }
    return pts;
  }

  hitCombo() {
    this.combo++;
    this.comboTimer=120;
    this.multiplier=Math.min(8, 1+Math.floor(this.combo/5));
    if(this.combo>4) {
      const cd=document.getElementById('combo-display');
      cd.textContent=`x${this.multiplier} COMBO!`;
      cd.style.opacity='1';
      cd.style.fontSize=`${22+Math.min(this.combo,10)*2}px`;
    }
  }

  updateLivesUI() {
    const el=document.getElementById('lives-display');
    el.innerHTML='';
    for(let i=0;i<3;i++) {
      const d=document.createElement('div');
      d.className='life-pip'+(i>=this.lives?' dead':'');
      el.appendChild(d);
    }
  }

  updatePowerupUI() {
    const el=document.getElementById('powerup-icons');
    el.innerHTML='';
    const icons={shield:'🛡',rapid:'⚡',speed:'💨'};
    if(this.ship.shield||this.ship.shieldTime>0) {
      const d=document.createElement('div');
      d.className='pu-icon';d.style.background='#0cf3';d.textContent='🛡';el.appendChild(d);
    }
    if(this.ship.rapidFire||this.ship.rapidTime>0) {
      const d=document.createElement('div');
      d.className='pu-icon';d.style.background='#f803';d.textContent='⚡';el.appendChild(d);
    }
    if(this.ship.speed||this.ship.speedTime>0) {
      const d=document.createElement('div');
      d.className='pu-icon';d.style.background='#0f83';d.textContent='💨';el.appendChild(d);
    }
  }

  spawnWave() {
    const n = 2+Math.floor(this.wave*1.5);
    for(let i=0;i<n;i++) {
      setTimeout(()=>{
        if(this.state!=='playing')return;
        const r=Math.random();
        const type = r<0.5?'scout':r<0.8?'cruiser':'bomber';
        this.enemies.push(new Enemy(type, this.wave));
      },i*400);
    }
    const astCount = 3+this.wave;
    for(let i=0;i<astCount;i++) {
      this.asteroids.push(new Asteroid({spd:rand(0.8,1.5+this.wave*0.1)}));
    }
  }

  update() {
    this.frame++;
    this.speed=1+this.frame*0.00008;

    // Screenshake
    shakeAmt=Math.max(0,shakeAmt-0.8);
    shakeX=rand(-shakeAmt,shakeAmt);
    shakeY=rand(-shakeAmt,shakeAmt);

    // Combo decay
    if(this.comboTimer>0) {
      this.comboTimer--;
      if(this.comboTimer<=0) {
        this.combo=0; this.multiplier=1;
        document.getElementById('combo-display').style.opacity='0';
      }
    }

    this.ship.update(this.keys, this.touchDir);
    this.updatePowerupUI();

    // Wave management
    this.waveTimer++;
    if(this.waveTimer>300&&this.enemies.length===0&&!this.boss) {
      this.waveTimer=0;
      this.wave++;
      this.spawnWave();
    }

    // Boss warning & spawn
    this.bossTimer++;
    const bossInterval=1800;
    if(!this.boss) {
      const prog=(this.bossTimer%bossInterval)/bossInterval;
      const warn=prog>0.85;
      document.getElementById('boss-bar').style.opacity=warn?'1':'0';
      if(warn) document.getElementById('boss-fill').style.width=((prog-0.85)/0.15*100)+'%';
      if(this.bossTimer%bossInterval===0) {
        this.boss=new Boss(Math.floor(this.bossTimer/bossInterval));
        document.getElementById('boss-bar').style.opacity='0';
        shake(8);
      }
    }

    // Spawn stray asteroids
    if(this.frame%120===0) this.asteroids.push(new Asteroid());

    // Update asteroids
    this.asteroids.forEach(a=>a.update());
    this.asteroids=this.asteroids.filter(a=>a.alive);

    // Update enemies
    this.enemies.forEach(e=>{
      e.update(this.ship);
      if(e.canShoot()) {
        const bs=e.shoot(this.ship);
        this.bullets.push(...bs);
      }
    });
    this.enemies=this.enemies.filter(e=>e.alive);

    // Update boss
    if(this.boss) {
      const bs=this.boss.update(this.ship);
      if(bs) this.bullets.push(...bs);
      if(!this.boss.alive) {
        explode(this.boss.x,this.boss.y,4,'#ff0');
        shake(20);
        this.addScore(this.boss.score);
        this.hitCombo();
        this.boss=null;
        // Drop lots of powerups
        for(let i=0;i<3;i++) this.powerups.push(new PowerUp(rand(100,W-100),rand(50,200)));
      }
    }

    // Ship shoot
    if((this.keys['Space']||this.keys[' ']||this.keys['z']||this.keys['Z'])&&this.ship.canShoot()) {
      this.bullets.push(...this.ship.shoot());
    }

    // Update bullets
    this.bullets.forEach(b=>b.update());
    this.bullets=this.bullets.filter(b=>b.alive);

    // Update powerups
    this.powerups.forEach(p=>p.update());
    this.powerups=this.powerups.filter(p=>p.alive);

    // Update particles
    particles.forEach(p=>p.update());
    particles=particles.filter(p=>p.life>0);

    // ── Collision Detection ──────────────────────────────
    // Player bullets vs asteroids
    this.bullets.filter(b=>!b.isEnemy).forEach(b=>{
      this.asteroids.forEach(a=>{
        if(!a.alive||!b.alive)return;
        if(dist(b,a)<a.r+b.r) {
          b.alive=false;
          a.hp-=b.damage;
          explode(b.x,b.y,0.5);
          if(a.hp<=0) {
            a.alive=false;
            explode(a.x,a.y,a.r/18);
            shake(3);
            this.addScore(Math.floor(30*a.r/20));
            this.hitCombo();
            if(a.r>28) {
              for(let i=0;i<2;i++) this.asteroids.push(new Asteroid({
                x:a.x, y:a.y, r:a.r*0.5,
                angle:rand(0,Math.PI*2), spd:rand(1.2,2.5)
              }));
            }
            if(Math.random()<0.12) this.powerups.push(new PowerUp(a.x,a.y));
          }
        }
      });
    });

    // Player bullets vs enemies
    this.bullets.filter(b=>!b.isEnemy).forEach(b=>{
      this.enemies.forEach(e=>{
        if(!e.alive||!b.alive)return;
        if(dist(b,e)<e.r+b.r) {
          b.alive=false;
          e.hp-=b.damage;
          explode(b.x,b.y,0.4,e.color);
          if(e.hp<=0) {
            e.alive=false;
            explode(e.x,e.y,1.2,e.color);
            shake(4);
            this.addScore(e.score);
            this.hitCombo();
            if(Math.random()<0.25) this.powerups.push(new PowerUp(e.x,e.y));
          }
        }
      });
      // vs boss
      if(this.boss&&b.alive&&dist(b,this.boss)<this.boss.r+b.r) {
        b.alive=false;
        this.boss.hp-=b.damage;
        explode(b.x,b.y,0.4,this.boss.color);
        if(this.boss.hp<=0) this.boss.alive=false;
      }
    });

    // Enemy bullets vs player
    if(this.ship.invincible<=0) {
      this.bullets.filter(b=>b.isEnemy).forEach(b=>{
        if(!b.alive)return;
        if(dist(b,this.ship)<this.ship.r-4+b.r) {
          b.alive=false;
          if(this.ship.shield) { explode(b.x,b.y,0.8,'#0cf'); shake(3); return; }
          this.ship.invincible=120;
          this.lives--;
          this.updateLivesUI();
          explode(this.ship.x,this.ship.y,1.5);
          shake(10);
          if(this.lives<=0) { this.gameOver(); }
        }
      });
    }

    // Asteroids vs player
    if(this.ship.invincible<=0) {
      this.asteroids.forEach(a=>{
        if(!a.alive)return;
        if(dist(a,this.ship)<a.r+this.ship.r-6) {
          if(this.ship.shield) {
            a.alive=false;
            explode(a.x,a.y,1,'#0cf');
            shake(5);
            return;
          }
          a.alive=false;
          this.ship.invincible=120;
          this.lives--;
          this.updateLivesUI();
          explode(this.ship.x,this.ship.y,1.5);
          shake(10);
          if(this.lives<=0) { this.gameOver(); }
        }
      });
    }

    // Enemies vs player
    if(this.ship.invincible<=0) {
      this.enemies.forEach(e=>{
        if(!e.alive)return;
        if(dist(e,this.ship)<e.r+this.ship.r-4) {
          if(this.ship.shield) {
            e.alive=false;
            explode(e.x,e.y,1.2,e.color);
            shake(5);
            return;
          }
          this.ship.invincible=120;
          this.lives--;
          this.updateLivesUI();
          explode(this.ship.x,this.ship.y,1.5);
          shake(10);
          e.alive=false;
          if(this.lives<=0) { this.gameOver(); }
        }
      });
    }

    // Powerup pickup
    this.powerups.forEach(p=>{
      if(!p.alive)return;
      if(dist(p,this.ship)<p.r+this.ship.r+4) {
        p.alive=false;
        if(p.type==='shield') this.ship.shieldTime=360;
        else if(p.type==='rapid') this.ship.rapidTime=420;
        else if(p.type==='speed') this.ship.speedTime=360;
        else if(p.type==='life') { this.lives=Math.min(3,this.lives+1); this.updateLivesUI(); }
        explode(p.x,p.y,0.8,p.color);
        this.updatePowerupUI();
      }
    });
  }

  gameOver() {
    this.state='dead';
    this.deathTimer=0;
    if(this.score>this.best) {
      this.best=this.score;
      localStorage.setItem('cc_best',this.best);
    }
    document.getElementById('bestVal').textContent=this.best;
    for(let i=0;i<3;i++) {
      setTimeout(()=>explode(this.ship.x+rand(-30,30),this.ship.y+rand(-30,30),2),i*200);
    }
  }

  drawMenu() {
    this.menuBlink++;
    // Title
    ctx.save();
    ctx.textAlign='center';
    ctx.shadowColor='#4af';
    ctx.shadowBlur=30;
    ctx.fillStyle='#fff';
    ctx.font=`900 ${W*0.11}px "Orbitron", monospace`;
    ctx.fillText('COSMIC', W/2, H*0.3);
    ctx.shadowColor='#f84';
    ctx.fillStyle='#f84';
    ctx.fillText('CHAOS', W/2, H*0.3+W*0.12);
    ctx.shadowBlur=0;

    // Subtitle
    ctx.font=`400 14px "Exo 2", sans-serif`;
    ctx.fillStyle='rgba(180,220,255,0.8)';
    ctx.letterSpacing='4px';
    ctx.fillText('AN ENDLESS SPACE ARCADE SHOOTER', W/2, H*0.3+W*0.12+34);

    // Blink prompt
    if(Math.floor(this.menuBlink/30)%2===0) {
      ctx.font=`600 18px "Orbitron", monospace`;
      ctx.fillStyle='#4af';
      ctx.shadowColor='#4af';
      ctx.shadowBlur=15;
      ctx.fillText('PRESS SPACE  /  TAP TO PLAY', W/2, H*0.72);
    }

    // Controls
    ctx.font=`300 13px "Exo 2", sans-serif`;
    ctx.fillStyle='rgba(150,200,255,0.5)';
    ctx.shadowBlur=0;
    ctx.fillText('WASD / ARROWS to move  •  SPACE / Z to shoot', W/2, H*0.82);
    ctx.fillText('Mobile: drag to move, auto-fires', W/2, H*0.86);

    // Best score
    if(this.best>0) {
      ctx.font=`400 15px "Orbitron", monospace`;
      ctx.fillStyle='rgba(255,200,80,0.8)';
      ctx.fillText(`BEST: ${this.best}`, W/2, H*0.92);
    }
    ctx.restore();

    // Auto-fire preview
    if(this.frame%14===0) {
      this.bullets.push(new Bullet(W/2+rand(-30,30),H*0.55,-Math.PI/2,8,{color:'#4ff',r:3}));
    }
    this.ship.x=W/2+Math.cos(this.frame*0.02)*60;
    this.ship.y=H*0.56+Math.sin(this.frame*0.03)*15;
    this.ship.wingAngle=this.frame*0.1;
    this.ship.engineFlare=0.7;
  }

  drawDead() {
    this.deathTimer++;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.65)';
    ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.font=`900 ${W*0.12}px "Orbitron", monospace`;
    ctx.fillStyle='#f44';
    ctx.shadowColor='#f44';
    ctx.shadowBlur=25;
    ctx.fillText('GAME', W/2, H*0.38);
    ctx.fillText('OVER', W/2, H*0.38+W*0.13);
    ctx.shadowBlur=0;
    ctx.font=`600 20px "Orbitron", monospace`;
    ctx.fillStyle='#fff';
    ctx.fillText(`SCORE: ${this.score}`, W/2, H*0.58);
    ctx.font=`400 16px "Orbitron", monospace`;
    ctx.fillStyle='#f80';
    ctx.fillText(`BEST: ${this.best}`, W/2, H*0.64);
    if(this.score>=this.best&&this.score>0) {
      ctx.font=`700 14px "Exo 2", sans-serif`;
      ctx.fillStyle='#ff0';
      ctx.shadowColor='#ff0';
      ctx.shadowBlur=12;
      ctx.fillText('★  NEW HIGH SCORE!  ★', W/2, H*0.70);
      ctx.shadowBlur=0;
    }
    if(this.deathTimer>60&&Math.floor(this.deathTimer/30)%2===0) {
      ctx.font=`600 15px "Orbitron", monospace`;
      ctx.fillStyle='#4af';
      ctx.fillText('SPACE / TAP TO RETRY', W/2, H*0.82);
    }
    ctx.restore();
  }

  draw() {
    ctx.save();
    ctx.translate(shakeX, shakeY);

    // Background
    ctx.fillStyle='#000008';
    ctx.fillRect(-10,-10,W+20,H+20);
    this.stars.draw(this.state==='playing'?this.speed:0.5);

    // Game objects
    this.asteroids.forEach(a=>a.draw());
    this.powerups.forEach(p=>p.draw());
    this.enemies.forEach(e=>e.draw());
    if(this.boss) this.boss.draw();
    this.bullets.forEach(b=>b.draw());
    particles.forEach(p=>p.draw());

    if(this.state==='playing'||this.state==='dead') this.ship.draw();

    if(this.state==='menu') this.drawMenu();
    if(this.state==='dead') this.drawDead();

    ctx.restore();
  }

  loop() {
    if(this.state==='playing') this.update();
    else if(this.state==='menu') {
      this.frame++;
      // Bullets and asteroids still move on menu
      this.bullets.forEach(b=>b.update());
      this.bullets=this.bullets.filter(b=>b.alive);
      particles.forEach(p=>p.update());
      particles=particles.filter(p=>p.life>0);
      if(this.frame%200===0) this.asteroids.push(new Asteroid());
      this.asteroids.forEach(a=>a.update());
      this.asteroids=this.asteroids.filter(a=>a.alive);
    } else if(this.state==='dead') {
      this.deathTimer=(this.deathTimer||0)+1;
      particles.forEach(p=>p.update());
      particles=particles.filter(p=>p.life>0);
    }
    this.draw();
    requestAnimationFrame(()=>this.loop());
  }
}

// Auto-shoot support (hold space)
// Boss health bar update
function init() {
  particles=[];
  shakeAmt=0;
  game=new Game();
  // Spawn some initial asteroids for menu atmosphere
  for(let i=0;i<5;i++) game.asteroids.push(new Asteroid({y:rand(-40,H)}));
  game.loop();
}

init();
</script>
